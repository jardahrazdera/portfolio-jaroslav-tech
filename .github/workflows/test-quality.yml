name: Test and Quality Assurance

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM

env:
  DJANGO_SECRET_KEY: 'test-secret-key-for-github-actions'
  DJANGO_DEBUG: '0'
  DJANGO_ALLOWED_HOSTS: 'localhost,127.0.0.1'
  POSTGRES_DB: 'test_db'
  POSTGRES_USER: 'test_user'
  POSTGRES_PASSWORD: 'test_password'
  POSTGRES_HOST: 'localhost'
  POSTGRES_PORT: '5432'

jobs:
  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        cd src
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black isort bandit safety
    
    - name: Code formatting check (Black)
      run: |
        cd src
        black --check --diff .
    
    - name: Import sorting check (isort)
      run: |
        cd src
        isort --check-only --diff .
    
    - name: Linting (flake8)
      run: |
        cd src
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Security check (bandit)
      run: |
        cd src
        bandit -r . -x tests/ -f json -o bandit-report.json || true
    
    - name: Dependency security check (safety)
      run: |
        cd src
        safety check --json --output safety-report.json || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          src/bandit-report.json
          src/safety-report.json

  test-sqlite:
    name: Fast Tests (SQLite)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        cd src
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-xdist pytest-cov
    
    - name: Run fast tests with SQLite
      run: |
        cd src
        python runtests.py --coverage --fast --parallel
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: src/coverage.xml
        flags: unittests
        name: codecov-umbrella

  test-postgres:
    name: Full Tests (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        cd src
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-xdist pytest-cov
    
    - name: Wait for PostgreSQL
      run: |
        while ! pg_isready -h localhost -p 5432 -U test_user; do
          echo "Waiting for PostgreSQL..."
          sleep 2
        done
    
    - name: Run database migrations
      run: |
        cd src
        python manage.py migrate --no-input
    
    - name: Run full test suite with PostgreSQL
      env:
        DJANGO_SETTINGS_MODULE: jaroslav_tech.settings
      run: |
        cd src
        # Override test settings to use PostgreSQL
        export POSTGRES_TEST_DB=1
        python runtests.py --coverage --verbose
    
    - name: Generate coverage report
      run: |
        cd src
        coverage report --show-missing
        coverage html
    
    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: src/htmlcov/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        cd src
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-xdist
    
    - name: Run integration tests
      run: |
        cd src
        python runtests.py --markers integration --verbose
    
    - name: Run API tests
      run: |
        cd src
        python runtests.py --markers api --verbose

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'performance')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        cd src
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-benchmark
    
    - name: Run performance tests
      run: |
        cd src
        python runtests.py --markers slow --verbose

  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        docker build -f src/Dockerfile -t devflow-test:latest .
    
    - name: Test Docker container
      run: |
        docker run --rm devflow-test:latest python manage.py check --deploy

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [quality-checks, test-sqlite, test-postgres]
    if: always()
    
    steps:
    - name: Check quality gate
      run: |
        if [[ "${{ needs.quality-checks.result }}" != "success" ]]; then
          echo "Quality checks failed"
          exit 1
        fi
        if [[ "${{ needs.test-sqlite.result }}" != "success" ]]; then
          echo "SQLite tests failed"
          exit 1
        fi
        if [[ "${{ needs.test-postgres.result }}" != "success" ]]; then
          echo "PostgreSQL tests failed"
          exit 1
        fi
        echo "All quality gates passed!"